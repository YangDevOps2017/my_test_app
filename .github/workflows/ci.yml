name: CI pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up python
        uses: actions/setup-python@v2
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint code
        run: |
          flake8 app

      - name: Run tests
        run: |
          pytest

      - name: Build docker image
        run: |
          docker build -t my-app:${GITHUB_SHA} .